name: Release Cold Scout OSS

on:
  push:
    tags:
      - 'oss-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version
        id: version
        run: echo "VERSION=$(cat coldscout-oss/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          cd coldscout-oss
          # Create a clean archive without .env, __pycache__, .db, venv
          tar --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              --exclude='*.db' \
              --exclude='venv' \
              --exclude='.venv' \
              --exclude='tmp' \
              -czf ../coldscout-oss-${{ steps.version.outputs.VERSION }}.tar.gz .
          cd ..
          # Also create a zip for Windows users
          cd coldscout-oss
          zip -r ../coldscout-oss-${{ steps.version.outputs.VERSION }}.zip . \
              -x '__pycache__/*' '*.pyc' '.env' '*.db' 'venv/*' '.venv/*' 'tmp/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cold Scout OSS v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Cold Scout OSS v${{ steps.version.outputs.VERSION }}

            Self-hosted lead generation pipeline — **free forever**.

            ### Quick Start
            1. Download and extract the archive
            2. Copy `.env.example` to `.env` and add your API keys
            3. Run `pip install -r requirements.txt && python run.py`
            4. Open `http://localhost:8000` for the dashboard

            ### What's Included
            - 5-stage pipeline: Discovery → Qualification → Personalization → Outreach → Reporting
            - Web dashboard for monitoring and manual control
            - SQLite database (no external DB needed)
            - Docker support included

            ### Required API Keys (all have free tiers)
            - **Google Places** — business discovery ($200/mo free credit)
            - **Groq** — AI email generation (free tier)
            - **Brevo** — email sending (300/day free)

            See [README](https://github.com/colddsam/coldscout/tree/main/coldscout-oss#readme) for full setup guide.
          files: |
            coldscout-oss-${{ steps.version.outputs.VERSION }}.tar.gz
            coldscout-oss-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
